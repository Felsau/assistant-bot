# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy with one click via the "Deploy to Render" button in the README.
services:
  - type: web
    name: assistant-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      # Auto-generated by Render — no need to set this.
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      # Fill these in the Render dashboard when prompted (sync:false = secret).
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
